<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT. - 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-600: #525252;
            --primary: #FF6B35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--white);ㅊ
            color: var(--black);
            min-height: 100vh;
            padding-bottom: 100px;
            animation: pageEnter 0.2s ease-out;
        }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            padding: 24px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-200);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-symbol {
            flex-shrink: 0;
        }

        .settings-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--gray-200);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--white);
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            background: var(--gray-100);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--black);
            stroke-width: 1.5;
            fill: none;
        }

        /* Main Content */
        .main-content { padding: 32px 28px; }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.2s ease-out backwards;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            border: 3px solid var(--primary);
        }

        .profile-avatar svg {
            width: 50px;
            height: 50px;
            stroke: var(--gray-400);
            stroke-width: 1.5;
            fill: none;
        }

        .profile-name {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-email {
            color: var(--gray-400);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .profile-edit-btn {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .profile-edit-btn:hover {
            background: var(--primary);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
            animation: slideUp 0.2s ease-out 0.05s backwards;
        }

        .stat-card {
            background: var(--gray-100);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--gray-600);
        }

        /* Section Title */
        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        /* Menu List */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideUp 0.2s ease-out 0.15s backwards;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--black);
        }

        .menu-item:hover {
            background: var(--gray-100);
            border-color: var(--black);
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            background: var(--gray-100);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--black);
            stroke-width: 1.5;
            fill: none;
        }

        .menu-label {
            font-size: 15px;
            font-weight: 500;
        }

        .menu-arrow svg {
            width: 20px;
            height: 20px;
            stroke: var(--gray-400);
            stroke-width: 1.5;
            fill: none;
        }

        /* Logout Button */
        .logout-btn {
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            background: var(--white);
            color: var(--gray-600);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: var(--gray-100);
            color: var(--black);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 28px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--gray-400);
            transition: color 0.2s ease;
        }

        .nav-item.active { color: var(--primary); }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.2s ease;
        }

        .nav-item:hover .nav-icon svg {
            stroke: var(--primary);
            transform: scale(1.1);
        }

        .nav-item.active .nav-icon svg {
            fill: currentColor;
            stroke-width: 0;
        }

        .nav-item.active:hover .nav-icon svg {
            transform: scale(1.1);
        }

        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
    </style>
</head>
