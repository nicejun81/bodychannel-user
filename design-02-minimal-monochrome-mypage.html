<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT. - 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-600: #525252;
            --primary: #FF6B35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overscroll-behavior: none; }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            padding-bottom: 100px;
            animation: pageEnter 0.2s ease-out;
        }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            padding: 24px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-200);
        }

        .location-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .location-selector svg {
            width: 20px;
            height: 20px;
            stroke: var(--black);
            stroke-width: 2;
            fill: none;
        }

        .settings-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--gray-200);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--white);
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            background: var(--gray-100);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--black);
            stroke-width: 1.5;
            fill: none;
        }

        /* Main Content */
        .main-content { padding: 32px 28px; }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.2s ease-out backwards;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            border: 3px solid var(--primary);
        }

        .profile-avatar svg {
            width: 50px;
            height: 50px;
            stroke: var(--gray-400);
            stroke-width: 1.5;
            fill: none;
        }

        .profile-name {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-email {
            color: var(--gray-400);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .profile-edit-btn {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .profile-edit-btn:hover {
            background: var(--primary);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
            animation: slideUp 0.2s ease-out 0.05s backwards;
        }

        .stat-card {
            background: var(--gray-100);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--gray-600);
        }

        /* Section Title */
        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        /* Menu List */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideUp 0.2s ease-out 0.15s backwards;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--black);
        }

        .menu-item:hover {
            background: var(--gray-100);
            border-color: var(--black);
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            background: var(--gray-100);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--black);
            stroke-width: 1.5;
            fill: none;
        }

        .menu-label {
            font-size: 15px;
            font-weight: 500;
        }

        .menu-arrow svg {
            width: 20px;
            height: 20px;
            stroke: var(--gray-400);
            stroke-width: 1.5;
            fill: none;
        }

        /* Logout Button */
        .logout-btn {
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            background: var(--white);
            color: var(--gray-600);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: var(--gray-100);
            color: var(--black);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 28px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--gray-400);
            transition: color 0.2s ease;
        }

        .nav-item.active { color: var(--primary); }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.2s ease;
        }

        .nav-item:hover .nav-icon svg {
            stroke: var(--primary);
            transform: scale(1.1);
        }

        .nav-item.active .nav-icon svg {
            fill: currentColor;
            stroke-width: 0;
        }

        .nav-item.active:hover .nav-icon svg {
            transform: scale(1.1);
        }

        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* My Memberships */
        .memberships-section {
            margin-bottom: 32px;
            animation: slideUp 0.2s ease-out 0.1s backwards;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-more {
            font-size: 13px;
            color: var(--gray-400);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s ease;
        }

        .section-more:hover {
            color: var(--primary);
        }

        .section-more svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .memberships-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 8px 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .memberships-scroll::-webkit-scrollbar {
            display: none;
        }

        .membership-card {
            min-width: 260px;
            flex-shrink: 0;
            scroll-snap-align: start;
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .membership-card:hover {
            transform: translateY(-2px);
        }

        .membership-card.active {
            background: var(--black);
            color: var(--white);
        }

        .membership-card.expiring {
            background: var(--white);
            border: 2px solid var(--primary);
            color: var(--black);
        }

        .membership-card.expired {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .membership-card.paused {
            background: var(--white);
            border: 2px solid var(--gray-400);
            color: var(--black);
        }

        .membership-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .membership-status {
            display: inline-block;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .membership-card.active .membership-status {
            background: var(--primary);
            color: var(--white);
        }

        .membership-card.expiring .membership-status {
            background: var(--primary);
            color: var(--white);
        }

        .membership-card.expired .membership-status {
            background: var(--gray-400);
            color: var(--white);
        }

        .membership-card.paused .membership-status {
            background: var(--gray-600);
            color: var(--white);
        }

        .membership-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .membership-gym {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 14px;
        }

        .membership-info {
            display: flex;
            gap: 16px;
        }

        .membership-info-item {
            display: flex;
            flex-direction: column;
        }

        .membership-info-label {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 2px;
        }

        .membership-info-value {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
        }

        .membership-card.expired .membership-info-value {
            color: var(--gray-600);
        }

        .membership-card.expiring .membership-gym,
        .membership-card.paused .membership-gym {
            opacity: 1;
            color: var(--gray-400);
        }

        .membership-card.expiring .membership-info-label,
        .membership-card.paused .membership-info-label {
            opacity: 1;
            color: var(--gray-400);
        }

    </style>
</head>
