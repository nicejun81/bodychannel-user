<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT. - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-600: #525252;
            --primary: #FF6B35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: pageEnter 0.2s ease-out;
        }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 28px;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 48px;
            animation: slideUp 0.2s ease-out backwards;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .logo-symbol {
            flex-shrink: 0;
        }

        .logo-subtitle {
            color: var(--gray-400);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Login Form */
        .login-form {
            animation: slideUp 0.2s ease-out 0.05s backwards;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--gray-600);
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--black);
            background: var(--gray-100);
        }

        .form-input::placeholder {
            color: var(--gray-400);
        }

        /* Password Field */
        .password-field {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--gray-400);
            stroke-width: 1.5;
            fill: none;
        }

        .password-toggle:hover svg {
            stroke: var(--black);
        }

        /* Options Row */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input {
            display: none;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid var(--gray-200);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .remember-me input:checked + .checkbox {
            background: var(--black);
            border-color: var(--black);
        }

        .checkbox svg {
            width: 12px;
            height: 12px;
            stroke: var(--white);
            stroke-width: 2;
            fill: none;
            opacity: 0;
        }

        .remember-me input:checked + .checkbox svg {
            opacity: 1;
        }

        .remember-me span {
            font-size: 14px;
            color: var(--gray-600);
        }

        .forgot-password {
            font-size: 14px;
            color: var(--gray-600);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-password:hover {
            color: var(--primary);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 18px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .login-btn:hover {
            background: var(--primary);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .divider-text {
            font-size: 13px;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Social Login */
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: slideUp 0.2s ease-out 0.1s backwards;
        }

        .social-btn {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            background: var(--white);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background: var(--gray-100);
            border-color: var(--black);
        }

        .social-btn.kakao {
            background: #FEE500;
            border-color: #FEE500;
            color: #000000;
        }

        .social-btn.kakao:hover {
            background: #F5DC00;
            border-color: #F5DC00;
        }

        .social-btn.naver {
            background: #03C75A;
            border-color: #03C75A;
            color: var(--white);
        }

        .social-btn.naver:hover {
            background: #02B350;
            border-color: #02B350;
        }

        .social-btn.google {
            background: var(--white);
        }

        .social-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
        }

        /* Sign Up Link */
        .signup-link {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--gray-600);
            animation: slideUp 0.2s ease-out 0.15s backwards;
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="main-content">
        <!-- Logo Section -->
        <div class="logo-section">
            <h1 class="logo">
                <img src="symbol.png" alt="logo" class="logo-symbol" width="48" height="48">
                <span>BODYCHANNEL</span>
            </h1>
            <p class="logo-subtitle">Your Fitness Partner</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">이메일</label>
                <input type="email" class="form-input" placeholder="이메일을 입력하세요" required>
            </div>

            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <div class="password-field">
                    <input type="password" class="form-input" id="passwordInput" placeholder="비밀번호를 입력하세요" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <svg viewBox="0 0 24 24" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox">
                    <div class="checkbox">
                        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <span>로그인 유지</span>
                </label>
                <a href="#" class="forgot-password">비밀번호 찾기</a>
            </div>

            <button type="submit" class="login-btn">로그인</button>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">또는</span>
                <div class="divider-line"></div>
            </div>

            <div class="social-buttons">
                <button type="button" class="social-btn kakao">
                    <span class="social-icon">
                        <svg viewBox="0 0 24 24" fill="#000000"><path d="M12 3C6.48 3 2 6.58 2 11c0 2.83 1.86 5.31 4.64 6.7-.15.54-.97 3.48-1 3.63 0 .1.04.2.13.26.09.05.2.05.29 0 .38-.23 4.42-2.9 4.94-3.24.33.03.66.05 1 .05 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg>
                    </span>
                    카카오로 시작하기
                </button>
                <button type="button" class="social-btn naver">
                    <span class="social-icon">
                        <svg viewBox="0 0 24 24" fill="#ffffff"><path d="M16.273 12.845L7.376 3H3v18h4.727V11.155L16.624 21H21V3h-4.727z"/></svg>
                    </span>
                    네이버로 시작하기
                </button>
                <button type="button" class="social-btn google">
                    <span class="social-icon">
                        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    </span>
                    Google로 시작하기
                </button>
            </div>

            <div class="signup-link">
                아직 회원이 아니신가요? <a href="design-02-minimal-monochrome-signup.html">회원가입</a>
            </div>
        </form>
    </main>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            // 로그인 처리 후 PT+ 페이지로 이동
            window.location.href = 'design-02-minimal-monochrome-purchase.html';
        }
    </script>
</body>
</html>
