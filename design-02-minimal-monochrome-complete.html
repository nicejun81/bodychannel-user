<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODYCHANNEL - 결제 완료</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-600: #525252;
            --primary: #FF6B35;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes pageEnter {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes checkmark {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes confetti {
            0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti 3s ease-out forwards;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 28px;
            animation: pageEnter 0.3s ease-out;
        }

        /* Success Icon */
        .success-icon {
            width: 120px;
            height: 120px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            animation: checkmark 0.5s ease-out 0.2s backwards;
        }

        .success-icon svg {
            width: 60px;
            height: 60px;
            stroke: var(--white);
            stroke-width: 3;
            fill: none;
        }

        /* Title */
        .complete-title {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            animation: slideUp 0.4s ease-out 0.4s backwards;
        }

        .complete-subtitle {
            font-size: 15px;
            color: var(--gray-400);
            text-align: center;
            margin-bottom: 40px;
            animation: slideUp 0.4s ease-out 0.5s backwards;
        }

        /* Order Info Card */
        .order-card {
            width: 100%;
            max-width: 400px;
            background: var(--gray-100);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 32px;
            animation: slideUp 0.4s ease-out 0.6s backwards;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .order-label {
            font-size: 13px;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .order-number {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        .order-product {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .product-icon {
            width: 60px;
            height: 60px;
            background: var(--white);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .product-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--primary);
            stroke-width: 1.5;
            fill: none;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .product-gym {
            font-size: 13px;
            color: var(--gray-400);
        }

        .order-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-label {
            font-size: 14px;
            color: var(--gray-600);
        }

        .detail-value {
            font-size: 14px;
            font-weight: 500;
        }

        .detail-value.price {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        /* Usage Info */
        .usage-info {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 40px;
            animation: slideUp 0.4s ease-out 0.7s backwards;
        }

        .usage-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .usage-title svg {
            width: 18px;
            height: 18px;
            stroke: var(--primary);
            stroke-width: 2;
            fill: none;
        }

        .usage-text {
            font-size: 13px;
            color: var(--gray-600);
            line-height: 1.6;
        }

        /* Buttons */
        .button-group {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: slideUp 0.4s ease-out 0.8s backwards;
        }

        .primary-btn {
            width: 100%;
            padding: 18px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .primary-btn:hover {
            background: var(--primary);
        }

        .secondary-btn {
            width: 100%;
            padding: 18px;
            background: var(--white);
            color: var(--black);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .secondary-btn:hover {
            background: var(--gray-100);
            border-color: var(--black);
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 28px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--gray-400);
            transition: color 0.2s ease;
        }

        .nav-item.active { color: var(--primary); }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.2s ease;
        }

        .nav-item:hover .nav-icon svg {
            stroke: var(--primary);
            transform: scale(1.1);
        }

        .nav-item.active .nav-icon svg {
            fill: currentColor;
            stroke-width: 0;
        }

        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Confetti -->
    <div class="confetti-container" id="confettiContainer"></div>

    <main class="main-content">
        <!-- Success Icon -->
        <div class="success-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>

        <!-- Title -->
        <h1 class="complete-title">결제가 완료되었습니다!</h1>
        <p class="complete-subtitle">이용권이 마이페이지에 등록되었습니다</p>

        <!-- Order Info Card -->
        <div class="order-card">
            <div class="order-header">
                <span class="order-label">주문번호</span>
                <span class="order-number" id="orderNumber">BC20241222001</span>
            </div>
            <div class="order-product">
                <div class="product-icon">
                    <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11M6.5 17.5h11M4 10h2.5v4H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1zM17.5 10H20a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2.5v-4zM6.5 8v8M17.5 8v8M9 10v4M15 10v4"/></svg>
                </div>
                <div class="product-info">
                    <div class="product-name" id="productName">PT 20회 패키지</div>
                    <div class="product-gym" id="productGym">피트니스 센터 강남점</div>
                </div>
            </div>
            <div class="order-details">
                <div class="detail-row">
                    <span class="detail-label">결제 수단</span>
                    <span class="detail-value" id="paymentMethod">카카오페이</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">결제 일시</span>
                    <span class="detail-value" id="paymentDate">2024.12.22 14:30</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">결제 금액</span>
                    <span class="detail-value price" id="paymentAmount">990,000원</span>
                </div>
            </div>
        </div>

        <!-- Usage Info -->
        <div class="usage-info">
            <div class="usage-title">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                이용 안내
            </div>
            <p class="usage-text">
                구매하신 이용권은 마이페이지 > 보유 이용권에서 확인하실 수 있습니다.
                이용권 사용은 헬스장 방문 시 앱을 통해 QR코드를 제시해 주세요.
            </p>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button class="primary-btn" onclick="location.href='design-02-minimal-monochrome-mypage.html'">이용권 확인하기</button>
            <button class="secondary-btn" onclick="location.href='design-02-minimal-monochrome-purchase.html'">계속 쇼핑하기</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="design-02-minimal-monochrome-home.html" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </span>
            <span class="nav-label">홈</span>
        </a>
        <a href="design-02-minimal-monochrome-purchase.html" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </span>
            <span class="nav-label">구매</span>
        </a>
        <a href="design-02-minimal-monochrome-reservation.html" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </span>
            <span class="nav-label">예약</span>
        </a>
        <a href="design-02-minimal-monochrome-activity.html" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </span>
            <span class="nav-label">활동</span>
        </a>
        <a href="design-02-minimal-monochrome-mypage.html" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
            </span>
            <span class="nav-label">마이</span>
        </a>
    </nav>

    <script>
        // Confetti 효과
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#FF6B35', '#22c55e', '#3b82f6', '#f59e0b', '#ec4899'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';

                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }

                container.appendChild(confetti);
            }

            // 3초 후 confetti 제거
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // 주문번호 생성
        function generateOrderNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const random = String(Math.floor(Math.random() * 1000)).padStart(3, '0');
            return `BC${year}${month}${day}${random}`;
        }

        // 현재 날짜/시간
        function getCurrentDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}.${month}.${day} ${hours}:${minutes}`;
        }

        // URL 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name');
        const productPrice = urlParams.get('price');
        const productGym = urlParams.get('gym');
        const paymentMethod = urlParams.get('method');

        // 값 설정
        document.getElementById('orderNumber').textContent = generateOrderNumber();
        document.getElementById('paymentDate').textContent = getCurrentDateTime();

        if (productName) {
            document.getElementById('productName').textContent = productName;
        }
        if (productPrice) {
            document.getElementById('paymentAmount').textContent = productPrice;
        }
        if (productGym) {
            document.getElementById('productGym').textContent = productGym;
        }
        if (paymentMethod) {
            document.getElementById('paymentMethod').textContent = paymentMethod;
        }

        // 페이지 로드 시 confetti 실행
        window.addEventListener('load', createConfetti);
    </script>
</body>
</html>
